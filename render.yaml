services:
  - type: web
    name: big-file-upload
    runtime: node
    plan: free
    # Render 免费套餐不支持 preDeployCommand；迁移本身幂等，可在构建完成后执行。
    buildCommand: npm ci --include=dev && npm run build && npm run migrate
    startCommand: npm start
    healthCheckPath: /health/live
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: REDIS_DRIVER
        value: redis
      # 使用已有的 Render Key Value；在 Render Dashboard 手动填写连接地址，勿提交到仓库。
      - key: REDIS_URL
        sync: false
      - key: STORAGE_DRIVER
        value: r2
      - key: MAIL_DRIVER
        value: smtp
      - key: APP_ORIGIN
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
      - key: OTP_PEPPER
        generateValue: true
      - key: LOCAL_SIGNING_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      # Render 当前无可用 IPv6 SMTP 出站路由；保持 SMTP_HOST 为域名并仅通过 IPv4 建连。
      - key: SMTP_ADDRESS_FAMILY
        value: ipv4
      - key: SMTP_DNS_TIMEOUT_MS
        value: 3000
      - key: SMTP_CONNECTION_TIMEOUT_MS
        value: 8000
      - key: SMTP_GREETING_TIMEOUT_MS
        value: 8000
      - key: SMTP_SOCKET_TIMEOUT_MS
        value: 15000
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false

  - type: cron
    name: big-file-upload-cleanup
    runtime: node
    schedule: "17 * * * *"
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run cleanup
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_DRIVER
        value: redis
      # 使用已有的 Render Key Value；在 Render Dashboard 手动填写连接地址，勿提交到仓库。
      - key: REDIS_URL
        sync: false
      - key: STORAGE_DRIVER
        value: r2
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
